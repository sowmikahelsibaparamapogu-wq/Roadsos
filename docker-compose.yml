version: "3.9"

services:

  # ── Backend (FastAPI) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadsos_backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MAPS_API_KEY=AIzaSyCLKZEITTgQ7Hk0yUTzarwGC9c5vaH0eq4
      - GEMINI_API_KEY=AIzaSyAU3LvR5b2-4coazi5UIcO07HG7s7Kvifo
      - REDIS_URL=redis://redis:6379
      # Optional Twilio
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React → nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=https://roadsos-backend-9ch2.onrender.com
        - REACT_APP_GOOGLE_MAPS_KEY=AIzaSyCLKZEITTgQ7Hk0yUTzarwGC9c5vaH0eq4
    container_name: roadsos_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (session storage) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: roadsos_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
